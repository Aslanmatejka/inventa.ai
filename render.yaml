services:
  # Backend — FastAPI + CadQuery
  - type: web
    name: inventa-backend
    runtime: python
    rootDir: Backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: PYTHONIOENCODING
        value: utf-8
      - key: CORS_ORIGINS
        sync: false  # set after frontend URL is known
      - key: ANTHROPIC_API_KEY
        sync: false  # set manually in dashboard
      - key: AI_MODEL_NAME
        value: claude-sonnet-4-20250514
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false

  # Frontend — React static site
  - type: web
    name: inventa-frontend
    env: static
    rootDir: client
    plan: free
    buildCommand: npm install && CI=false GENERATE_SOURCEMAP=false npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_HOST
        sync: false  # set after backend URL is known
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
