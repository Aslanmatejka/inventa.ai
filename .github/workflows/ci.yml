name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-tests:
    name: Backend tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: Backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Backend/requirements.txt
          pip install ruff

      - name: Lint (ruff)
        run: ruff check Backend scripts tests

      - name: Verify namespace parity
        run: python scripts/check_namespace_parity.py

      - name: Run backend test suite
        env:
          PYTHONIOENCODING: utf-8
          # Tests don't make real API calls, but the library imports need a
          # placeholder to load settings without raising.
          ANTHROPIC_API_KEY: sk-ant-ci-placeholder
        run: |
          set -e
          fails=0
          for t in test_completeness.py test_cq_warehouse.py test_drone_analyzer.py \
                   test_drone_types.py test_ground_fix.py test_phase1.py \
                   test_phase32.py test_phone_case_analyzer.py test_shape_quality.py \
                   test_code_safety.py test_preprocessing.py test_product_library.py \
                   test_rebuild.py test_claude_extract_json.py \
                   test_fix_code_error_classification.py test_endpoints_smoke.py \
                   test_visual_knowledge.py test_config_loader.py \
                   test_path_traversal.py test_prompt_injection.py \
                   test_usage_meter.py test_metrics.py test_token_tracker.py; do
            echo "::group::$t"
            if python "$t"; then
              echo "PASS $t"
            else
              echo "::error file=$t::Test script failed"
              fails=$((fails+1))
            fi
            echo "::endgroup::"
          done
          if [ "$fails" -gt 0 ]; then
            echo "::error::$fails test script(s) failed"
            exit 1
          fi

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install frontend dependencies
        working-directory: client
        run: npm ci

      - name: Build frontend
        working-directory: client
        env:
          CI: "false" # treat CRA warnings as warnings, not errors
        run: npm run build
